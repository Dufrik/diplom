<div th:fragment="menu">
<!-- menu -->
<style>
		  .navbar {
		    backdrop-filter: blur(10px);
		    background: linear-gradient(135deg, #e0eafc, #cfdef3);
		    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
		    transition: all 0.3s ease;
		  }
		
		  .navbar-brand img {
		    border-radius: 8px;
		    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
		    transition: transform 0.3s ease;
		  }
		
		  .navbar-brand img:hover {
		    transform: scale(1.05);
		  }
		
		  .navbar-nav .nav-link {
		    padding: 8px 15px;
		    border-radius: 25px;
		    transition: background-color 0.3s, color 0.3s;
		  }
		
		  .navbar-nav .nav-link:hover,
		  .navbar-nav .nav-link.active {
		    background-color: #0d6efd;
		    color: #fff;
		  }
		
		  .d-flex input[type="search"] {
		    border-radius: 20px 0 0 20px;
		    border: 1px solid #ccc;
		    padding: 6px 12px;
		    transition: box-shadow 0.3s;
		  }
		
		  .d-flex input[type="search"]:focus {
		    box-shadow: 0 0 8px rgba(13, 110, 253, 0.5);
		    outline: none;
		  }
		
		  .btn-outline-primary {
		    border-radius: 0 20px 20px 0;
		    transition: background-color 0.3s, color 0.3s;
		  }
		
		  .btn-outline-primary:hover {
		    background-color: #0d6efd;
		    color: #fff;
		  }
</style>
		
    <div th:if="${auth == null}">
        <!-- menu -->
		<nav class="navbar navbar-expand-lg bg-light px-4 py-2">
		  <div class="container-fluid">
		    <a class="navbar-brand d-flex align-items-center" href="/">
		      <img th:src="@{/img/logo.png}" style="width: 80px; height: auto;">
		    </a>
		    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
		      <span class="navbar-toggler-icon"></span>
		    </button>
		    <div class="collapse navbar-collapse" id="navbarSupportedContent">
		      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
		        <li class="nav-item">
		          <a class="nav-link" aria-current="page" href="/catalog">Каталог</a>
		        </li>
		        <li class="nav-item">
		          <a class="nav-link" href="/contacts">Контакты</a>
		        </li>
		        <li class="nav-item">
		          <a class="nav-link" href="/login">Вход</a>
		        </li>
		      </ul>
		      <form class="d-flex" role="search" action="/search" method="post">
		        <input class="form-control me-2" type="search" name="search" placeholder="Поиск" aria-label="Поиск">
		        <button class="btn btn-outline-primary" type="submit">Поиск</button>
		      </form>
		    </div>
		  </div>
		</nav>
    </div>

                    </form>
                </div>
            </div>
        </nav>

                    <form class="d-flex" role="search" action="/search" method="post">
