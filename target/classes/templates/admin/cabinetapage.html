<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Tech Store</title>
  <link href="/css/contstyle.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div th:replace="elements/header/header :: header"></div>
<div class="container">
   	<div th:replace="elements/menu/menu :: menu"></div>
    <br>

    <!-- personal information -->
    <button type="button" class="btn btn-outline-primary">Админ </button><br><br>

    <!-- menu -->
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body text-center">
                    <form action="/savea" method="post" id="support-form">

                        <div class="input-group flex-nowrap">
                            <span class="input-group-text" >Имя</span>
                            <input type="text" name="name" class="form-control" th:value="${name}" aria-describedby="addon-wrapping">
                        </div><br>

                        <div class="input-group flex-nowrap">
                            <span class="input-group-text">Логин</span>
                            <input type="text" name="login" class="form-control" th:value="${login}" placeholder="Login" aria-describedby="addon-wrapping">
                        </div><br>

                        <div class="input-group flex-nowrap">
                            <span class="input-group-text">Пароль</span>
                            <input type="text" name="password" class="form-control" th:value="${password}" placeholder="Password" aria-describedby="addon-wrapping">
                        </div><br>

                        <button class="btn btn-outline-secondary" type="submit" id="button-addon2">Сохранить</button>

                    </form>
                </div>
            </div>
        </div>
    </div><br>

</div>
</body>
</html>
