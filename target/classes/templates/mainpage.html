<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Tech Store</title>
    <link href="/css/contstyle.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
	<div th:replace="elements/header/header :: header"></div>
	
	<div class="container">
	
		<div th:replace="elements/menu/menu :: menu"></div>
	    <br>
	
		<!-- carousel -->
		<div id="carouselExample" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000" style="width: 80%; margin: 0 auto;">

		  <div class="carousel-indicators">
		    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Слайд 1"></button>
		    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="1" aria-label="Слайд 2"></button>
		    <button type="button" data-bs-target="#carouselExample" data-bs-slide-to="2" aria-label="Слайд 3"></button>
		  </div>
		  
		  <div class="carousel-inner">
		    <div class="carousel-item active">
		      <a href="/catalog">
		        <img th:src="@{/img/back1.jpg}" class="d-block w-100" style="height: auto;">
		      </a>
		    </div>
		    <div class="carousel-item">
		      <a href="/catalog">
		        <img th:src="@{/img/back2.jpg}" class="d-block w-100" style="height: auto;">
		      </a>
		    </div>
		    <div class="carousel-item">
		      <a href="/catalog">
		        <img th:src="@{/img/back3.jpg}" class="d-block w-100" style="height: auto;">
		      </a>
		    </div>
		  </div>
		  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
		    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
		    <span class="visually-hidden">Предыдущий</span>
		  </button>
		  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
		    <span class="carousel-control-next-icon" aria-hidden="true"></span>
		    <span class="visually-hidden">Следующий</span>
		  </button>
		</div>
	
	</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
