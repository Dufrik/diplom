<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Tech Store</title>
    <link href="/css/contstyle.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div th:replace="elements/header/header :: header"></div>
<div class="container">
	<div th:replace="elements/menu/menu :: menu"></div>
    <br>

    <!-- Authorization -->
    <div class="row">
        <div class="col-md-4"></div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body text-center">
                    <form action="/login" method="post" id="login-form">

                        <h2><strong>Авторизация</strong></h2><br>
                        <div th:if= "${params_not_found != null}"><div class="alert alert-danger" role="alert">Не все данные заполены</div></div>
                        <div th:if= "${user_not_found != null}"><div class="alert alert-danger" role="alert">Пользователь не найден</div></div>

                        <div class="form-floating mb-3">
                            <input type="text" name="login" class="form-control" id="logininput" placeholder="Login">
                            <label for="logininput">Логин</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" name="password" class="form-control" id="passinput" placeholder="Password">
                            <label for="passinput">Пароль</label>
                        </div>
                        <div class="row">
                            <div class="col-2"></div>
                            <div class="col-4"><button type="submit" class="btn btn-success">Вход</button></div>
                            <div class="col-4"><a class="btn btn-outline-success" href="/register" role="button">Регистрация</a></div>
                        </div><br>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
