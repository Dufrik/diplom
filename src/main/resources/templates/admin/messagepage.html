<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Tech Store</title>
    <link href="/css/contstyle.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div th:replace="elements/header/header :: header"></div>
<div class="container">
	<div th:replace="elements/menu/menu :: menu"></div>
    <br>

    <!-- unanswered -->
    <button type="button" class="btn btn-outline-primary">Неотвеченные сообщения</button><br>

    <table class="table">
        <thead>
        <tr>
            <th scope="col">№</th>
            <th scope="col">Вопрос</th>
            <th scope="col">Сообщение</th>
            <th scope="col">Ответ</th>
        </tr>
        </thead>
        <tbody>
        <div th:each="el : ${message1}">
            <tr>
                <td><h6 th:text="${el.id}"/></td>
                <td><h6 th:text="${el.question}"/></td>
                <td><h6 th:text="${el.message}"/></td>
                <td>
                  <form action="/answer" method="post">
                    <input type="hidden" name="id" th:value="${el.id}">
                    <input type="text" name="answer">
                    <button type="submit" class="btn btn-outline-primary">Отправить</button>
                  </form>
                </td>
            </tr>
        </div>
        </tbody>
    </table>

    <!-- answered -->
    <button type="button" class="btn btn-outline-primary">Отвеченные сообщения</button><br>

    <table class="table">
        <thead>
        <tr>
            <th scope="col">№</th>
            <th scope="col">Вопрос</th>
            <th scope="col">Сообщение</th>
            <th scope="col">Ответ</th>
        </tr>
        </thead>
        <tbody>
        <div th:each="el : ${message2}">
            <tr>
                <td><h6 th:text="${el.id}"/></td>
                <td><h6 th:text="${el.question}"/></td>
                <td><h6 th:text="${el.message}"/></td>
                <td><h6 th:text="${el.answer}"/></td>
            </tr>
        </div>
        </tbody>
    </table>

</div>
</body>
</html>
