<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Tech Store</title>
    <link href="/css/contstyle.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div th:replace="elements/header/header :: header"></div>
<div class="container">
		<div th:replace="elements/menu/menu :: menu"></div>
        <div class="card-body text-center">
            <form method="post" action="/addproduct" id="reg-form" enctype="multipart/form-data">
                <h2><strong>Добавить товар</strong></h2><br>
                <div class="form-floating mb-3">
                	<div class="mb-3">
					  <label for="floatingInput0" class="form-label me-2" style="margin-left: 0px;">Категория</label>
					  <select class="form-select" id="floatingInput0" name="categoryId">
					    <option value="1">Компьютеры</option>
					    <option value="2">Телефоны</option>
					    <option value="3">Аксессуары</option>
					  </select>
					</div>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" name="name" class="form-control" id="floatingInput1" placeholder="Name">
                    <label for="floatingInput1">Наименование</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" name="info" class="form-control" id="floatingInput2" placeholder="info">
                    <label for="floatingInput2">Описание</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" name="price" class="form-control" id="floatingInput3" placeholder="price">
                    <label for="floatingInput3">Цена</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" name="count" class="form-control" id="floatingInput4" placeholder="count">
                    <label for="floatingInput4">Количество</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" name="manufacturer" class="form-control" id="floatingInput5"
                           placeholder="manufacturer">
                    <label for="floatingInput5">Производитель</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" name="releaseDate" class="form-control" id="floatingInput6"
                           placeholder="releaseDate">
                    <label for="floatingInput6">Дата релиза</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" name="link" class="form-control" id="floatingInput7" placeholder="link">
                    <label for="floatingInput7">Link</label>
                </div>
                <!-- <div class="mb-3">
					<label for="formFile" class="form-label">Загрузить фото</label>
					<input class="form-control" type="file" id="formFile" name="link" accept=".jpg, .jpeg, .png">
				</div> -->
                <div class="row">
                    <div class="col-2"></div>
                    <div class="col-4">
                        <button type="submit" class="btn btn-success">Добавить</button>
                    </div>
                </div>
            </form>
        </div>

</div>
</body>
</html>
