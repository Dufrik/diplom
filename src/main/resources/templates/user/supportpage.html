<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Tech Store</title>
  <link href="/css/contstyle.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div th:replace="elements/header/header :: header"></div>
<div class="container">
    <div th:replace="elements/menu/menu :: menu"></div>
    <br>

    <!-- support -->
    <button type="button" class="btn btn-outline-primary">Поддержка</button><br><br>

    <div class="row">
      <div class="col-md-6">
        <div class="card">
          <div class="card-body text-center">
            <form action="/messagesend" method="post" id="support-form">
                <div class="input-group mb-3">
                    <input type="text" name="comment" class="form-control" placeholder="Question" aria-label="Имя пользователя получателя" aria-describedby="button-addon2">
                    <button class="btn btn-outline-secondary" type="submit" id="button-addon2">Отправить</button>
                </div>
            </form>
          </div>
        </div>
      </div>
    </div><br>

    <table class="table">
        <thead>
        <tr>
            <th scope="col">№</th>
            <th scope="col">Вопро</th>
            <th scope="col">Сообщение</th>
            <th scope="col">Ответ</th>
            <th scope="col">Статус</th>
        </tr>
        </thead>
        <tbody>
        <div th:each="el : ${questions}">
            <tr>
                <td><h6 th:text="${el.id}"/></td>
                <td><h6 th:text="${el.question}"/></td>
                <td><h6 th:text="${el.message}"/></td>
                <td><h6 th:text="${el.answer}"/></td>
                <td><h6 th:text="${el.status}"/></td>
            </tr>
        </div>
        </tbody>
    </table>

</div>
</body>
</html>
