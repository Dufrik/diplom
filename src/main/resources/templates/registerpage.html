<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Tech Store</title>
    <link href="/css/contstyle.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div th:replace="elements/header/header :: header"></div>
<div class="container">
	<div th:replace="elements/menu/menu :: menu"></div>
    <br>

    <!-- Registration -->
    <div class="container">
        <div class="row">
            <div class="col-md-4"></div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body text-center">
                        <form method="post" action="/register" id="reg-form">
                            <h2><strong>Регистрация</strong></h2><br>

                            <div th:if= "${error != null}"><div class="alert alert-danger" role="alert">Не все данные заполнены</div></div>
                            <div th:if= "${pass != null}"><div class="alert alert-danger" role="alert">Пароль не совпал</div></div>
                            <div th:if= "${mail != null}"><div class="alert alert-danger" role="alert">Некорректно указан E-mail</div></div>
                            <div th:if= "${login != null}"><div class="alert alert-danger" role="alert">Логин уже существует</div></div>

                            <div class="form-floating mb-3">
                                <input type="text" name="name" class="form-control" id="floatingInput1" placeholder="Name">
                                <label for="floatingInput1">Имя</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="text" name="login" class="form-control" id="floatingInput2" placeholder="Login">
                                <label for="floatingInput2">Логин</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" name="password" class="form-control" id="floatingInput3" placeholder="Password">
                                <label for="floatingInput3">Пароль</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" name="confirm" class="form-control" id="floatingInput4" placeholder="Confirm password">
                                <label for="floatingInput4">Подтвердите пароль</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="text" name="mail" class="form-control" id="floatingInput5" placeholder="E-mail">
                                <label for="floatingInput5">E-mail</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="text" name="info" class="form-control" id="floatingInput6" placeholder="Contact">
                                <label for="floatingInput6">Контакты</label>
                            </div>
                            <div class="row">
                                <div class="col-2"></div>
                                <div class="col-4"><button type="submit" class="btn btn-success">Регистрация</button></div>
                                <div class="col-4"><a class="btn btn-outline-success" href="/login" role="button">Вход</a></div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div><br>
    </div>

</div>
</body>
</html>
